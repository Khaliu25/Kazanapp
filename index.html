<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Казань Квест Радар</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="secret-title">KAZAN RADAR</h1>
        <p id="app-subtitle" class="subtitle">Ищи городские аномалии</p>
        
        <div id="radar-card" class="card">
            <p id="status-text">Готов к поиску приключений?</p>
            
            <div id="quest-zone" class="hidden">
                <div class="distance-box">
                    <span class="distance-label">ДИСТАНЦИЯ</span>
                    <p id="distance-val"><span id="meters">---</span> м</p>
                </div>
                
                <div class="radar-circle">
                    <div class="radar-line"></div>
                    <div id="compass-arrow" class="needle"></div>
                </div>
                <p class="hint">Двигайся так, чтобы расстояние сокращалось</p>
            </div>
        </div>

        <div id="unlock-zone" class="card success-card hidden">
            <div class="badge">ЛОКАЦИЯ ОТКРЫТА 🎉</div>
            <h2 id="venue-name">Название</h2>
            
            <div class="venue-image-placeholder">
                <span class="lock-icon">🔓</span>
            </div>

            <div class="recommendation-box">
                <h4>ИНСАЙДЕРСКИЙ СОВЕТ:</h4>
                <p id="venue-rec">...</p>
            </div>
            <p class="achievement-text">🗺️ +1 открытая зона в твоей Казани</p>
        </div>

        <button id="action-btn">СКАНИРОВАТЬ МЕСТНОСТЬ</button>
        
        <button id="cheat-btn" class="cheat-hidden">⚡ СИМУЛЯЦИЯ АНЛОКА</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
